name: event-only-v2-explore
description: >
  Phase 2 exploration: sweep signal_mode, VIX thresholds, entry_count,
  spread width, and expanded SL range.  term_inversion locked OFF (99.0)
  based on Phase 1 results showing it loses every head-to-head.
  DTE 5-10 and SPX 2d -0.01 locked from Phase 1 winners.

portfolio:
  starting_capital: [20000]
  max_trades_per_day: [3]
  monthly_drawdown_limit: [0.15]
  lot_per_equity: [20000]
  max_equity_risk_pct: [0.10]
  max_margin_pct: [0.30]
  calls_only: [false]

trading:
  tp_pct: [0.50, 0.60, 0.70, 0.80]
  sl_mult: [null, 1.5, 2.0, 3.0]
  avoid_opex: [true]
  width_filter: [10.0, 15.0, 20.0]
  entry_count: [2, 3, 5, 7]

event:
  enabled: [true]
  event_only: [true]
  signal_mode: ["any", "spx_and_vix"]
  budget_mode: ["shared"]
  max_event_trades: [1, 2, 3]
  spx_drop_threshold: [-0.005, -0.01]
  spx_drop_2d_threshold: [-0.01]
  vix_spike_threshold: [0.10, 0.15, 0.20]
  vix_elevated_threshold: [20, 25, 30]
  term_inversion_threshold: [99.0]
  side_preference: ["puts", "calls", "best"]
  min_dte: [5]
  max_dte: [10]
  min_delta: [0.10]
  max_delta: [0.20]
  rally_avoidance: [false]

filters:
  min_dte_lt_max_dte: true
  min_delta_lt_max_delta: true
  shared_single_event_trade: false
