name: event-only
description: >
  Event-only strategies that ONLY trade on SPX drop days.
  Suppresses all scheduled trades, combined with wide SPX drop
  thresholds and event-driven put credit spread parameters.

portfolio:
  starting_capital: [20000]
  max_trades_per_day: [3]
  monthly_drawdown_limit: [0.15]
  lot_per_equity: [20000]
  calls_only: [false]

trading:
  tp_pct: [0.50, 0.60, 0.70, 0.80]
  sl_mult: [null, 2.0, 3.0]
  max_vix: [30.0, null]
  avoid_opex: [true]
  width_filter: [10.0]

event:
  enabled: [true]
  event_only: [true]
  signal_mode: ["any"]
  budget_mode: ["shared"]
  max_event_trades: [1, 2, 3]
  spx_drop_threshold: [-0.005, -0.01, -0.015, -0.02, -0.03, -0.05]
  spx_drop_2d_threshold: [-0.01, -0.02, -0.03, -0.05]
  side_preference: ["puts", "best"]
  min_dte: [3, 5]
  max_dte: [5, 7, 10]
  min_delta: [0.10, 0.15]
  max_delta: [0.20, 0.25]
  rally_avoidance: [true, false]

filters:
  min_dte_lt_max_dte: true
  min_delta_lt_max_delta: true
  shared_single_event_trade: false
