name: event-only-v2
description: >
  Tier 3 production candidate (E2E pipeline review): focused grid that
  bakes in the winning levers from the v2_explore (62,208-config) walk-
  forward.  Locked: width_filter=20.0 (best WF Sharpe), side_preference
  =best (consistently top across windows), term_inversion=99.0
  (disabled; loses every Phase-1 head-to-head).  Swept: SL on/off (null
  vs 3.0), entry_count (3 vs 7), TP, SPX/VIX thresholds, max_event_trades.
  Designed to walk-forward in <2 min with --backtest-workers 8 (Tier 4
  parallelization), so iterating on the next tweak is cheap.

portfolio:
  starting_capital: [20000]
  max_trades_per_day: [3]
  monthly_drawdown_limit: [0.15]
  lot_per_equity: [20000]
  max_equity_risk_pct: [0.10]
  max_margin_pct: [0.30]
  calls_only: [false]

trading:
  tp_pct: [0.50, 0.60]
  sl_mult: [null, 3.0]
  avoid_opex: [true]
  width_filter: [20.0]
  entry_count: [3, 7]

event:
  enabled: [true]
  event_only: [true]
  signal_mode: ["any"]
  budget_mode: ["shared"]
  max_event_trades: [1, 2, 3]
  spx_drop_threshold: [-0.005, -0.01]
  spx_drop_2d_threshold: [-0.01, -0.02]
  vix_spike_threshold: [0.15]
  vix_elevated_threshold: [25.0]
  term_inversion_threshold: [99.0]
  side_preference: ["best"]
  min_dte: [3, 5]
  max_dte: [7, 10]
  min_delta: [0.10]
  max_delta: [0.20]
  rally_avoidance: [false]

filters:
  min_dte_lt_max_dte: true
  min_delta_lt_max_delta: true
  shared_single_event_trade: false
