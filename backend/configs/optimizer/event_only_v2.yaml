name: event-only-v2
description: >
  Tier 3 production candidate, refreshed from the v3_explore (18,432-
  config) walk-forward + A1/A2 holdout review.  Findings re-baked in:
  (1) side_preference=puts dominated 100% of PASS rows (locked "best"
  was a historical miscalibration); (2) sl_mult=4.0 surfaces alongside
  null/3.0 in multi-window PASS configs so we re-open the SL ladder;
  (3) entry_count=5 is competitive with {3, 7} on the multi-window
  picker.  Still locked from v2_explore: width_filter=20.0 (best WF
  Sharpe), term_inversion=99.0 (disabled; loses every Phase-1 head-to-
  head).  Grid size: 864 configs — walk-forwards in <3 min with
  --backtest-workers 8 (Tier 4 parallelization).

portfolio:
  starting_capital: [20000]
  max_trades_per_day: [3]
  monthly_drawdown_limit: [0.15]
  lot_per_equity: [20000]
  max_equity_risk_pct: [0.10]
  max_margin_pct: [0.30]
  calls_only: [false]

trading:
  tp_pct: [0.50, 0.60]
  sl_mult: [null, 3.0, 4.0]
  avoid_opex: [true]
  width_filter: [20.0]
  entry_count: [3, 5, 7]

event:
  enabled: [true]
  event_only: [true]
  signal_mode: ["any"]
  budget_mode: ["shared"]
  max_event_trades: [1, 2, 3]
  spx_drop_threshold: [-0.005, -0.01]
  spx_drop_2d_threshold: [-0.01, -0.02]
  vix_spike_threshold: [0.15]
  vix_elevated_threshold: [25.0]
  term_inversion_threshold: [99.0]
  side_preference: ["puts"]
  min_dte: [3, 5]
  max_dte: [7, 10]
  min_delta: [0.10]
  max_delta: [0.20]
  rally_avoidance: [false]

filters:
  min_dte_lt_max_dte: true
  min_delta_lt_max_delta: true
  shared_single_event_trade: false
