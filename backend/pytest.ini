[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = --cov=spx_backend --cov-report=term-missing:skip-covered --cov-report=xml --timeout=300 --timeout-method=signal
markers =
    e2e: End-to-end API workflow tests
    integration: DB-backed integration tests requiring DATABASE_URL_TEST
    regression: Targeted regression tests for failure/edge branches
