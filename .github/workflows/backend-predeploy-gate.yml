name: Backend Predeploy Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-predeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run predeploy test gate
        run: make PYTHON_BIN=python3.11 test-predeploy
